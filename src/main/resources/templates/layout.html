<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Admin Dashboard</title>
    <!-- Bootstrap 5 CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            color: white;
            background-color: #343a40;
        }

        .content {
            padding: 30px;
        }

        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Ecommerce Dashboard</a>
            </div>
        </nav>
    </div>

    <div th:fragment="sidebar">
        <div class="sidebar">
            <h5 class="px-3">Menu</h5>
            <a href="#" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}"><i
                    class="fas fa-home me-2"></i> Dashboard</a>
            <a href="/admin/categories"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/categories') ? 'active' : ''}"><i
                    class="fas fa-list me-2"></i> Categories</a>
            <a href="/admin/products"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/products') ? 'active' : ''}"><i
                    class="fas fa-box me-2"></i> Products</a>
            <a href="/admin/orders"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/orders') ? 'active' : ''}"><i
                    class="fas fa-shopping-cart me-2"></i> Orders</a>
            <a href="/admin/customers"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/customers') ? 'active' : ''}"><i
                    class="fas fa-users me-2"></i> Customers</a>
            <a href="/admin/payments"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/payments') ? 'active' : ''}"><i
                    class="fas fa-credit-card me-2"></i> Payments</a>
            <a href="/admin/carts"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/carts') ? 'active' : ''}"><i
                    class="fas fa-shopping-basket me-2"></i> Carts</a>
            <a href="/admin/wishlists"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/wishlists') ? 'active' : ''}"><i
                    class="fas fa-heart me-2"></i> Wishlists</a>
            <a href="/admin/shipping"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/shipping') ? 'active' : ''}"><i
                    class="fas fa-truck-loading me-2"></i> Logistics</a>
            <a href="/admin/reviews"
                th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/reviews') ? 'active' : ''}"><i
                    class="fas fa-star me-2"></i> Public Reviews</a>
        </div>
    </div>

    <div th:fragment="alerts">
        <div th:if="${success_msg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success_msg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error_msg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error_msg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>

</html>

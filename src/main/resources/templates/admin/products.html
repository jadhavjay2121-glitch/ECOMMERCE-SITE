<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Manage Products')}"></head>

<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{layout :: sidebar}"></div>
            </div>

            <div class="col-md-10 content">
                <h2 class="mb-4">Manage Products</h2>

                <div th:replace="~{layout :: alerts}"></div>

                <div class="d-flex justify-content-between mb-3">
                    <h4>All Products</h4>
                    <a href="/admin/products/add" class="btn btn-primary"><i class="fas fa-plus"></i> Add New
                        Product</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Price</th>
                                        <th>Stock</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="product : ${products}">
                                        <td th:text="${product.id}"></td>
                                        <td class="fw-bold" th:text="${product.name}"></td>
                                        <td
                                            th:text="${product.category != null ? product.category.name : 'Uncategorized'}">
                                        </td>
                                        <td th:text=" '$' + ${product.price}"></td>
                                        <td>
                                            <span th:text="${product.inventoryCount}"></span>
                                            <small class="text-danger ms-1" th:if="${product.inventoryCount <= 5}"><i
                                                    class="fas fa-exclamation-triangle"></i></small>
                                        </td>
                                        <td>
                                            <span class="badge bg-success" th:if="${product.status}">Active</span>
                                            <span class="badge bg-danger" th:unless="${product.status}">Inactive</span>
                                        </td>
                                        <td class="text-end">
                                            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                                                class="btn btn-sm btn-outline-warning">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <form th:if="${product.status}"
                                                th:action="@{/admin/products/deactivate/{id}(id=${product.id})}"
                                                method="post" class="d-inline"
                                                onsubmit="return confirm('WARNING: Deactivating this product will hide it from the customer interface. Are you sure you want to proceed?');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="fas fa-eye-slash"></i> Deactivate
                                                </button>
                                            </form>
                                            <button th:unless="${product.status}" class="btn btn-sm btn-secondary"
                                                disabled>Deactivated</button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(products)}">
                                        <td colspan="7" class="text-center text-muted">No products available. Please add
                                            some!</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>

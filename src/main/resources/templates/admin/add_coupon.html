<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Generate Coupon')}"></head>

<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{layout :: sidebar}"></div>
            </div>

            <div class="col-md-10 content">
                <h2 class="mb-4">Generate Promotional Discount</h2>

                <div th:replace="~{layout :: alerts}"></div>

                <div class="card" style="max-width: 800px;">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-tags me-2"></i> Coupon Parameters Setup</h5>
                    </div>
                    <div class="card-body border-0 shadow-sm">
                        <form th:action="@{/admin/coupons/add}" th:object="${coupon}" method="post">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="couponCode" class="form-label fw-bold">Active Coupon Code Phrase <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-keyboard"></i></span>
                                        <input type="text" class="form-control text-uppercase font-monospace"
                                            id="couponCode" th:field="*{couponCode}" placeholder="e.g. SUMMER2026"
                                            required>
                                    </div>
                                    <small class="text-muted">Customers will type this at checkout.</small>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="discountType" class="form-label fw-bold">Discount Variant <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="discountType" th:field="*{discountType}" required>
                                        <option value="Percentage">Percentage (%) Off Subtotal</option>
                                        <option value="Fixed Amount">Fixed Amount ($) Deducted</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="discountValue" class="form-label fw-bold">Discount Magnitude (Weight)
                                        <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" class="form-control" id="discountValue"
                                        th:field="*{discountValue}" placeholder="10.00" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="validFrom" class="form-label fw-bold">Promotion Start Timeline <span
                                            class="text-danger">*</span></label>
                                    <input type="datetime-local" class="form-control" id="validFrom"
                                        th:field="*{validFrom}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="validTo" class="form-label fw-bold">Promotion End Expiration <span
                                            class="text-danger">*</span></label>
                                    <input type="datetime-local" class="form-control" id="validTo" th:field="*{validTo}"
                                        required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="usageLimit" class="form-label fw-bold">Total Usage Limit Pool
                                        (Optional)</label>
                                    <input type="number" class="form-control" id="usageLimit" th:field="*{usageLimit}"
                                        placeholder="e.g 100 uses only...">
                                </div>
                            </div>

                            <div class="mt-4 border-top pt-3">
                                <button type="submit" class="btn btn-primary"><i class="fas fa-check-circle me-1"></i>
                                    Publish Live</button>
                                <a th:href="@{/admin/coupons}" class="btn btn-secondary ms-2">Discard Array</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Edit Coupon')}"></head>

<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{layout :: sidebar}"></div>
            </div>

            <div class="col-md-10 content">
                <h2 class="mb-4">Modify Promotional Configuration</h2>

                <div th:replace="~{layout :: alerts}"></div>

                <div class="card" style="max-width: 800px;">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="fas fa-edit me-2"></i> Update Active Parameters For Coupon '<span
                                class="font-monospace" th:text="${coupon.couponCode}"></span>'</h5>
                    </div>
                    <div class="card-body shadow-sm">
                        <form th:action="@{/admin/coupons/edit/{id}(id=${coupon.id})}" th:object="${coupon}"
                            method="post">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="discountType" class="form-label fw-bold">Discount Variant <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="discountType" th:field="*{discountType}" required>
                                        <option value="Percentage">Percentage (%) Off Subtotal</option>
                                        <option value="Fixed Amount">Fixed Amount ($) Deducted</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="discountValue" class="form-label fw-bold">Discount Magnitude Option
                                        <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" class="form-control" id="discountValue"
                                        th:field="*{discountValue}" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="validFrom" class="form-label fw-bold">Promotion Start Timeline <span
                                            class="text-danger">*</span></label>
                                    <input type="datetime-local" class="form-control" id="validFrom"
                                        th:field="*{validFrom}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="validTo" class="form-label fw-bold">Promotion End Expiration <span
                                            class="text-danger">*</span></label>
                                    <input type="datetime-local" class="form-control" id="validTo" th:field="*{validTo}"
                                        required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="usageLimit" class="form-label fw-bold">Limit Expansion Settings</label>
                                    <input type="number" class="form-control" id="usageLimit" th:field="*{usageLimit}">
                                    <small class="text-muted">Currently mapped usage pool constraints.</small>
                                </div>
                            </div>

                            <div class="mt-4 border-top pt-3">
                                <button type="submit" class="btn btn-warning"><i class="fas fa-save me-1"></i> Save
                                    Changes</button>
                                <a th:href="@{/admin/coupons}" class="btn btn-secondary ms-2">Discard Adjustments</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>

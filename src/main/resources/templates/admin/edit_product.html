<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Edit Product')}"></head>

<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{layout :: sidebar}"></div>
            </div>

            <div class="col-md-10 content">
                <h2 class="mb-4">Edit Product</h2>

                <div class="card" style="max-width: 800px;">
                    <div class="card-body">
                        <form th:action="@{/admin/products/edit/{id}(id=${product.id})}" th:object="${product}"
                            method="post">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label fw-bold">Product Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}"
                                        placeholder="Enter product name" required>
                                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}"
                                        th:errors="*{name}">Name error</div>
                                </div>
                                <div class="col-md-6">
                                    <label for="category" class="form-label fw-bold">Category <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="category" th:field="*{category}" required>
                                        <option value="" disabled>Select a Category...</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                            th:text="${cat.name}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="price" class="form-label fw-bold">Price ($) <span
                                            class="text-danger">*</span></label>
                                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}"
                                        placeholder="0.00" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="sku" class="form-label fw-bold">SKU (Stock Keeping Unit)</label>
                                    <input type="text" class="form-control" id="sku" th:field="*{sku}"
                                        placeholder="e.g. PROD-1234">
                                </div>
                                <div class="col-md-4">
                                    <label for="inventoryCount" class="form-label fw-bold">Inventory Count <span
                                            class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="inventoryCount"
                                        th:field="*{inventoryCount}" placeholder="0" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Product Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}"
                                    rows="5"></textarea>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update
                                    Product</button>
                                <a th:href="@{/admin/products}" class="btn btn-secondary ms-2">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>

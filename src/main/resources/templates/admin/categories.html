<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Manage Categories')}"></head>

<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{layout :: sidebar}"></div>
            </div>

            <div class="col-md-10 content">
                <h2 class="mb-4">Manage Categories</h2>

                <div th:replace="~{layout :: alerts}"></div>

                <div class="d-flex justify-content-between mb-3">
                    <h4>Active Categories</h4>
                    <a href="/admin/categories/add" class="btn btn-primary"><i class="fas fa-plus"></i> Add New
                        Category</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Description</th>
                                        <th class="text-center">Products</th>
                                        <th>Created On</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="catWithCount : ${categories}">
                                        <td th:text="${catWithCount.category.id}"></td>
                                        <td class="fw-bold" th:text="${catWithCount.category.name}"></td>
                                        <td>
                                            <span
                                                th:if="${catWithCount.category.description != null && catWithCount.category.description.length() > 50}"
                                                th:text="${#strings.substring(catWithCount.category.description, 0, 50) + '...'}"></span>
                                            <span
                                                th:if="${catWithCount.category.description != null && catWithCount.category.description.length() <= 50}"
                                                th:text="${catWithCount.category.description}"></span>
                                        </td>
                                        <td class="text-center">
                                            <span class="badge bg-secondary rounded-pill" style="font-size: 14px;"
                                                th:text="${catWithCount.productCount}">0</span>
                                        </td>
                                        <td
                                            th:text="${#temporals.format(catWithCount.category.createdAt, 'dd MMM yyyy')}">
                                        </td>
                                        <td class="text-end">
                                            <a th:href="@{/admin/categories/edit/{id}(id=${catWithCount.category.id})}"
                                                class="btn btn-sm btn-outline-warning">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <form
                                                th:action="@{/admin/categories/delete/{id}(id=${catWithCount.category.id})}"
                                                method="post" class="d-inline"
                                                onsubmit="return confirm('WARNING: Please assign products to a new category before deactivating it. Are you sure you want to deactivate?');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="fas fa-trash"></i> Deactivate
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(categories)}">
                                        <td colspan="6" class="text-center text-muted">No categories available. Please
                                            add some!</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>

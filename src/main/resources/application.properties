spring.application.name=ecommerce-system

# To use MySQL, uncomment the following lines and comment out H2:
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update

# Using H2 for standalone persistent storage (will create a file "ecommerce_db.mv.db" in the directory)
spring.datasource.url=jdbc:h2:file:./ecommerce_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow Thymeleaf hot-reloading
spring.thymeleaf.cache=false
